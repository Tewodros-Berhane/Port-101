<!doctype html>
<html lang="en" data-theme="system">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Port-101 temporarily unavailable</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600" rel="stylesheet">
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f7f7f5;
            --card: #ffffff;
            --text: #171717;
            --text-muted: #66655f;
            --border: rgba(23, 23, 23, 0.12);
            --primary: #171717;
            --primary-foreground: #f7f7f5;
            --shadow: 0 1px 2px rgba(23, 23, 23, 0.06), 0 10px 30px rgba(23, 23, 23, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f10;
                --card: #171719;
                --text: #f2f2ef;
                --text-muted: #a1a19a;
                --border: rgba(242, 242, 239, 0.10);
                --primary: #f2f2ef;
                --primary-foreground: #111113;
                --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 12px 34px rgba(0, 0, 0, 0.28);
            }
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: "Instrument Sans", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        .shell {
            margin: 0 auto;
            display: flex;
            min-height: 100vh;
            width: 100%;
            max-width: 72rem;
            flex-direction: column;
            padding: 2rem 1.5rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.25rem;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: inherit;
            text-decoration: none;
        }

        .brand-mark {
            display: inline-flex;
            height: 2.5rem;
            width: 2.5rem;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            border: 1px solid var(--border);
            background: var(--card);
            box-shadow: var(--shadow);
            font-size: 1rem;
            font-weight: 600;
        }

        .brand-copy {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text);
        }

        .brand-surface {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge {
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 999px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .main {
            display: flex;
            flex: 1;
            align-items: center;
            padding: 3rem 0;
        }

        .grid {
            display: grid;
            width: 100%;
            gap: 2.5rem;
        }

        .status-column {
            display: grid;
            gap: 0.75rem;
            align-content: start;
        }

        .status-eyebrow {
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .status-code {
            font-size: clamp(4rem, 9vw, 5.5rem);
            font-weight: 600;
            letter-spacing: -0.05em;
            line-height: 1;
        }

        .content {
            display: grid;
            gap: 2rem;
        }

        .copy {
            display: grid;
            max-width: 48rem;
            gap: 1rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.05;
        }

        .message {
            max-width: 42rem;
            font-size: 1.125rem;
            line-height: 1.75;
            color: color-mix(in srgb, var(--text) 85%, transparent);
        }

        .details {
            max-width: 42rem;
            font-size: 1rem;
            line-height: 1.65;
            color: var(--text-muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            white-space: nowrap;
            border-radius: 0.875rem;
            border: 1px solid transparent;
            padding: 0.625rem 1rem;
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(23, 23, 23, 0.06);
            transition: background-color 150ms ease, border-color 150ms ease, color 150ms ease, transform 150ms ease;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button-primary {
            background: var(--primary);
            color: var(--primary-foreground);
        }

        .button-secondary {
            border-color: var(--border);
            background: var(--card);
            color: var(--text);
        }

        @media (min-width: 1024px) {
            .shell {
                padding: 2rem 3rem;
            }

            .grid {
                grid-template-columns: 10.5rem minmax(0, 1fr);
                gap: 4rem;
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 1.5rem;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
            }

            .actions {
                flex-direction: column;
            }

            .button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="shell">
            <header class="header">
                <a class="brand" href="/">
                    <span class="brand-mark">P</span>
                    <span class="brand-copy">
                        <span class="brand-name">Port-101</span>
                        <span class="brand-surface">Workspace error</span>
                    </span>
                </a>

                <div class="badge">Error 502</div>
            </header>

            <main class="main" role="main" aria-labelledby="title">
                <div class="grid">
                    <div class="status-column">
                        <p class="status-eyebrow">Application</p>
                        <div class="status-code">502</div>
                    </div>

                    <div class="content">
                        <div class="copy">
                            <h1 id="title">Port-101 is down right now.</h1>
                            <p class="message">The service is temporarily unavailable.</p>
                            <p class="details">Refresh the page in a moment and try again.</p>
                        </div>

                        <div class="actions">
                            <button class="button button-primary" type="button" onclick="window.location.reload()">Try again</button>
                            <a class="button button-secondary" href="/">Return home</a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
