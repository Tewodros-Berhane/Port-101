name: nightly-regression

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-regression
  cancel-in-progress: false

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: port_101_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d port_101_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      APP_ENV: testing
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: port_101_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: pgsql, pdo_pgsql

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build Assets
        run: npm run build

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Clear Cached Config
        run: php artisan optimize:clear

      - name: Create Artifact Directory
        run: mkdir -p storage/test-results

      - name: Run Full Regression Suite
        run: php -d memory_limit=512M ./vendor/bin/pest --log-junit storage/test-results/nightly-junit.xml

      - name: Run Performance Audit Snapshot
        run: php artisan ops:performance:audit --json > storage/test-results/performance-audit.json

      - name: Upload Nightly Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-artifacts
          path: storage/test-results
          if-no-files-found: error
