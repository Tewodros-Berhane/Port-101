x-app-service: &app-service
  build:
    context: .
    target: app
  image: erp-app:latest
  restart: unless-stopped
  env_file:
    - .env
  environment:
    APP_ENV: production
    APP_DEBUG: false
    APP_URL: http://localhost:${APP_PORT:-8080}
    LOG_CHANNEL: stderr
    LOG_STACK: stderr
    DB_CONNECTION: pgsql
    DB_HOST: db
    DB_PORT: 5432
    DB_DATABASE: ${POSTGRES_DB:-erp}
    DB_USERNAME: ${POSTGRES_USER:-erp}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-erp}
    DB_SSLMODE: disable
    CACHE_STORE: database
    SESSION_DRIVER: database
    QUEUE_CONNECTION: database
    MAIL_MAILER: log
    SESSION_SECURE_COOKIE: false
  volumes:
    - app-storage:/var/www/html/storage
  depends_on:
    db:
      condition: service_healthy

services:
  app:
    <<: *app-service
    build:
      context: .
      target: app
    expose:
      - "9000"

  nginx:
    build:
      context: .
      target: nginx
    image: erp-nginx:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app-storage:/var/www/html/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  queue:
    <<: *app-service
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--verbose"]

  scheduler:
    <<: *app-service
    command: ["php", "artisan", "schedule:work"]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp}
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-erp}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  app-storage:
  postgres-data:
